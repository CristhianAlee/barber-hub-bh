    <script>
      // Anti-FOUC: aplica o tema salvo antes do primeiro paint.
      // Chave e default idênticos ao useTheme (STORAGE_KEY="barberhub.theme", default "dark").
      (function () {
        var theme = localStorage.getItem("barberhub.theme") === "light" ? "light" : "dark";
        var r = document.documentElement;
        r.classList.remove("dark", "light");
        r.classList.add(theme);
        r.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
