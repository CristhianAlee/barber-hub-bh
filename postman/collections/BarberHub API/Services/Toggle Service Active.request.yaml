$kind: http-request
name: Toggle Service Active
method: PATCH
url: '{{baseUrl}}/services?id=eq.{{serviceId}}'
order: 5000
headers:
  - key: apikey
    value: '{{SUPABASE_ANON_KEY}}'
  - key: Authorization
    value: 'Bearer {{ACCESS_TOKEN}}'
  - key: Content-Type
    value: application/json
  - key: Prefer
    value: return=representation
body:
  type: json
  content: |-
    {
      "active": false
    }
