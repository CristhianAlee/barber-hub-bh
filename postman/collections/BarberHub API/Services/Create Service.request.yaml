$kind: http-request
name: Create Service
method: POST
url: '{{baseUrl}}/services'
order: 3000
headers:
  - key: apikey
    value: '{{SUPABASE_ANON_KEY}}'
  - key: Authorization
    value: 'Bearer {{ACCESS_TOKEN}}'
  - key: Content-Type
    value: application/json
  - key: Prefer
    value: return=representation
body:
  type: json
  content: |-
    {
      "barbershop_id": "{{barbershopId}}",
      "name": "Corte de Cabelo",
      "duration_minutes": 30,
      "price": 35.00
    }
