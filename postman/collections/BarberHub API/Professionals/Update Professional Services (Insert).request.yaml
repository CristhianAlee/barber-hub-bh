$kind: http-request
name: 'Update Professional Services (Insert)'
method: POST
url: '{{baseUrl}}/professional_services'
order: 7000
headers:
  - key: apikey
    value: '{{SUPABASE_ANON_KEY}}'
  - key: Authorization
    value: 'Bearer {{ACCESS_TOKEN}}'
  - key: Content-Type
    value: application/json
  - key: Prefer
    value: return=representation
body:
  type: json
  content: |-
    [
      {
        "professional_id": "{{professionalId}}",
        "service_id": "{{serviceId}}",
        "barbershop_id": "{{barbershopId}}"
      }
    ]
