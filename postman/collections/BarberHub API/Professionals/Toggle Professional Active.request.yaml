$kind: http-request
name: Toggle Professional Active
method: PATCH
url: '{{baseUrl}}/professionals?id=eq.{{professionalId}}'
order: 4000
headers:
  - key: apikey
    value: '{{SUPABASE_ANON_KEY}}'
  - key: Authorization
    value: 'Bearer {{ACCESS_TOKEN}}'
  - key: Content-Type
    value: application/json
  - key: Prefer
    value: return=representation
body:
  type: json
  content: |-
    {
      "active": false
    }
