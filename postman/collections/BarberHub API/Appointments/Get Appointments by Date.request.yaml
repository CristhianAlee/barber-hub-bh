$kind: http-request
name: Get Appointments by Date
method: GET
url: '{{baseUrl}}/appointments?select=id,time,date,status,notes,duration_minutes,professional_id,client_id,service_id,clients(name,phone),services(name,price,duration_minutes),professionals(name)&barbershop_id=eq.{{barbershopId}}&date=eq.{{date}}&order=time'
order: 1000
headers:
  - key: apikey
    value: '{{SUPABASE_ANON_KEY}}'
  - key: Authorization
    value: 'Bearer {{ACCESS_TOKEN}}'
