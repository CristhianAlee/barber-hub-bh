$kind: http-request
name: Update Product
method: PATCH
url: '{{baseUrl}}/products?id=eq.{{productId}}'
order: 3000
headers:
  - key: apikey
    value: '{{SUPABASE_ANON_KEY}}'
  - key: Authorization
    value: 'Bearer {{ACCESS_TOKEN}}'
  - key: Content-Type
    value: application/json
  - key: Prefer
    value: return=representation
body:
  type: json
  content: |-
    {
      "name": "Pomada Modeladora",
      "stock_quantity": 15,
      "unit_price": 28.00
    }
